<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Extender Alquiler - SportRent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="../css/extender_alquiler.css" rel="stylesheet"/>
</head>
<body>
<div class="modal-overlay">
<div class="extension-card">
<!-- Encabezado Oscuro -->
<header class="ext-header">
<div>
<span class="ext-subtitle">SOLICITAR EXTENSIÓN</span>
<h1 class="ext-title"></h1>
</div>
<a aria-label="Cerrar" class="close-btn" href="mis_alquileres.html">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24">
<line x1="18" x2="6" y1="6" y2="18"></line>
<line x1="6" x2="18" y1="6" y2="18"></line>
</svg>
</a>
</header>
<!-- Contenido Principal -->
<main class="ext-body">
<!-- Periodo Actual -->
<div class="period-box">
<h3 class="section-label">PERIODO ACTUAL</h3>
<div class="period-timeline">
<div class="period-endpoint">
<span class="endpoint-label">Inicio</span>
<span class="endpoint-date"></span>
</div>
<div class="period-line">
<div class="line-track"></div>
<span class="line-duration"></span>
</div>
<div class="period-endpoint">
<span class="endpoint-label">Fin actual</span>
<span class="endpoint-date"></span>
</div>
</div>
</div>
<!-- Días a añadir -->
<div class="add-days-section">
<h3 class="section-label">Días adicionales a añadir</h3>
<div class="counter-container">
<button aria-label="Restar" class="counter-btn">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><line x1="5" x2="19" y1="12" y2="12"></line></svg>
</button>
<div class="counter-value">
<span class="number">1</span>
<span class="unit">día</span>
</div>
<button aria-label="Sumar" class="counter-btn">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
</button>
</div>
<div class="quick-add-pills">
<button class="pill active">+1d</button>
<button class="pill">+2d</button>
<button class="pill">+3d</button>
<button class="pill">+5d</button>
<button class="pill">+7d</button>
</div>
</div>
<!-- Resumen de Coste -->
<div class="summary-box">
<div class="summary-row">
<div class="summary-col">
<span class="summary-label">NUEVA FECHA DE FIN</span>
<span class="summary-value color-purple"></span>
</div>
<div class="summary-col text-right">
<span class="summary-label">COSTE ADICIONAL</span>
<span class="summary-value"></span>
</div>
</div>
</div>
<!-- Nota Informativa -->
<div class="info-alert">
<svg class="info-icon" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="16" y2="12"></line><line x1="12" x2="12.01" y1="8" y2="8"></line></svg>
<p>La extensión está sujeta a disponibilidad. Recibirás confirmación en menos de 2 horas.</p>
</div>
</main>
<!-- Acciones Footer -->
<footer class="ext-footer">
<a class="btn-confirm" href="mis_alquileres.html"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><rect height="18" rx="2" ry="2" width="18" x="3" y="4"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg> Confirmar extensión</a>
</footer>
</div>
</div>
<script src="../js/api.js"></script>
<script src="../js/extender_alquiler.js"></script>
</body>
</html>
