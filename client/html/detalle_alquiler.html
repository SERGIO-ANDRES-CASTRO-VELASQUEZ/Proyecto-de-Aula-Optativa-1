<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detalle de Alquiler - SportRent</title>
<!-- Use the existing CSS for fonts and basic styling where possible, and add custom css -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="../css/detalle_alquiler.css" rel="stylesheet"/>
</head>
<body>
<div class="modal-overlay">
<div class="ticket-card">
<!-- Encabezado Oscuro -->
<header class="ticket-header">
<div>
<span class="ticket-id">TICKET DE ALQUILER</span>
<h1 class="ticket-title"></h1>
</div>
<a aria-label="Cerrar" class="close-btn" href="mis_alquileres.html">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24">
<line x1="18" x2="6" y1="6" y2="18"></line>
<line x1="6" x2="18" y1="6" y2="18"></line>
</svg>
</a>
</header>
<!-- Contenido Principal -->
<main class="ticket-body">
<!-- Info de Producto -->
<div class="product-info">
<img alt="" class="product-img" src=""/>
<div class="product-details">
<span class="status-badge status-active"><svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></span>
<span class="product-category"></span>
<h2 class="product-name"></h2>
</div>
</div>
<!-- Resumen Fechas -->
<div class="dates-grid">
<div class="date-box">
<span class="label">INICIO</span>
<span class="value"></span>
</div>
<div class="date-box">
<span class="label">FIN</span>
<span class="value"></span>
</div>
<div class="date-box">
<span class="label">DURACIÓN</span>
<span class="value"></span>
</div>
</div>
<!-- Punto de recogida -->
<div class="pickup-info">
<div class="pickup-icon">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
</div>
<div class="pickup-details">
<span class="label">PUNTO DE RECOGIDA</span>
<span class="value"></span>
<span class="sub-value"></span>
</div>
</div>
<!-- Desglose de pago -->
<div class="payment-breakdown">
<h3 class="section-title">DESGLOSE DEL PAGO</h3>
<ul class="payment-list"></ul>
</div>
<!-- Estado del alquiler (Timeline) -->
<div class="rental-status">
<h3 class="section-title">ESTADO DEL ALQUILER</h3>
<div class="timeline"></div>
</div>
</main>
<!-- Acciones Footer -->
<footer class="ticket-footer">
<button class="btn-secondary">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                    Descargar ticket
                </button>
<a class="btn-primary" href="extender_alquiler.html" style="text-decoration:none">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    Solicitar extensión
                </a>
</footer>
</div>
</div>
<script src="../js/api.js"></script>
<script src="../js/detalle_alquiler.js"></script>
</body>
</html>
