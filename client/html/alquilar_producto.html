<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alquilar Producto - SportRent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="../css/alquilar_producto.css" rel="stylesheet"/>
</head>
<body>
<div class="modal-overlay">
<div class="alquilar-card">
<!-- ====== LADO IZQUIERDO: FIJO ====== -->
<div class="image-col">
<span class="badge-tag bg-purple"></span>
<div class="main-image">
<img alt="" src=""/>
</div>
<div class="thumbnails"></div>
<div class="perks-row">
<div class="perk-item">
<svg fill="none" height="16" stroke="var(--primary-color)" stroke-width="2" viewbox="0 0 24 24" width="16"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Seguro incluido
                    </div>
<div class="perk-item">
<svg fill="none" height="16" stroke="var(--primary-color)" stroke-width="2" viewbox="0 0 24 24" width="16"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Revisado
                    </div>
<div class="perk-item">
<svg fill="none" height="16" stroke="var(--primary-color)" stroke-width="2" viewbox="0 0 24 24" width="16"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        Recogida 24h
                    </div>
</div>
</div>
<!-- ====== LADO DERECHO: SCROLLABLE ====== -->
<div class="info-col">
<div class="info-header">
<div class="meta-info">
<span class="category-pill"></span>
<span class="rating">
<svg fill="#fbbf24" height="14" viewbox="0 0 24 24" width="14"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
<strong></strong></span>
</div>
<a aria-label="Cerrar" class="close-btn" href="client_index.html">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</a>
</div>
<h1 class="product-title"></h1>
<div class="product-price"><strong></strong><span>/día</span></div>
<div class="section-block">
<h3 class="section-title">
<svg fill="none" height="16" stroke="var(--primary-color)" stroke-width="2" viewbox="0 0 24 24" width="16"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="16" y2="12"></line><line x1="12" x2="12.01" y1="8" y2="8"></line></svg>
                        DESCRIPCIÓN
                    </h3>
<p class="desc-text"></p>
</div>
<div class="section-block">
<h3 class="section-title">
<svg fill="none" height="16" stroke="var(--primary-color)" stroke-width="2" viewbox="0 0 24 24" width="16"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" x2="7.01" y1="7" y2="7"></line></svg>
                        ESPECIFICACIONES
                    </h3>
<div class="specs-table"></div>
</div>
<div class="section-block">
<h3 class="section-title">
<svg fill="none" height="16" stroke="var(--currentColor)" stroke-width="2" viewbox="0 0 24 24" width="16"><rect height="18" rx="2" ry="2" width="18" x="3" y="4"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>
                        PERIODO DE ALQUILER
                    </h3>
<!-- Simulación de Calendario -->
<div class="calendar-widget"></div>
</div>
<div class="summary-block">
<h3 class="summary-title">RESUMEN DEL PRECIO</h3>
<ul class="summary-list"></ul>
</div>
<!-- Sticky bottom actions (relative inside the scroll container, or just at bottom) -->
<div class="action-footer">
<a class="btn-confirm-rent" href="checkout.html">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" x2="21" y1="6" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        Añadir al carrito
                    </a>
<p class="action-note">No se te cobrará aún. El pago se hará en el Checkout.</p>
</div>
</div>
</div>
</div>
<script src="../js/api.js"></script>
<script src="../js/product.js"></script>
</body>
</html>
