<!DOCTYPE html>

    <meta name="description" content="Sistema de alquiler de artículos deportivos SportRent">

<body class="auth-page">
    <div class="login-container">
        <div class="header-container">
            <a href="index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

        <h1 class="title">Recuperar Contraseña</h1>
        <p class="subtitle" style="margin-bottom: 2rem;">Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña</p>
        
        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
            </div>
            
            <button type="submit" class="btn-primary" style="margin-bottom: 0;">Enviar Instrucciones</button>
        </form>
    </div>

    <script src="../js/api.js"></script>
