<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SportRent</title>
    <meta name="description" content="Sistema de alquiler de artículos deportivos SportRent">
    <meta name="keywords" content="alquiler, deportes, sportrent, sistema, tickets">
    <meta name="author" content="Sergio Andres Casto Velasquez">
    <link rel="Shortcut icon" href="../../img/icon.png">
    <link rel="icon" type="image/png" href="../../img/icon.png?v=2">
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <h1 class="title">SportRent</h1>
        <p class="subtitle">Plataforma de Alquiler Deportivo</p>
        
        <form id="loginForm">
            <div class="form-group">
                <!-- MODIFICADO: label y tipo cambiados de "Usuario/text" a "Email/email" -->
                <label for="username">Correo electrónico</label>
                <input type="email" id="username" class="form-control" placeholder="correo@ejemplo.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    <svg class="toggle-password" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <!-- Eye open icon default -->
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">Iniciar Sesión</button>
            
            <div class="footer-links">
                <a href="forgot_password.html">¿Olvidaste tu contraseña?</a>
                <a href="register.html">Crear cuenta</a>
            </div>
        </form>
    </div>

    <!-- AGREGADO: api.js debe ir ANTES de login.js -->
    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
