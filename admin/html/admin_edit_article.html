<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SportRent</title>
    <meta name="description" content="Vista de ejemplo para editar articulo en SportRent">
    <meta name="keywords" content="inventario, editar articulo, admin, sportrent">
    <meta name="author" content="Sergio Andres Casto Velasquez">
    <link rel="Shortcut icon" href="../../img/icon.png">
    <link rel="icon" type="image/png" href="../../img/icon.png?v=2">
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="../css/admin_inventory.css">
    <link href="../css/boxicons.min.css" rel='stylesheet'>
</head>
<body>
<div class="modal-overlay static-open">
        <section class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
            <header class="modal-head">
                <div>
                    <h1 id="editTitle">Editar Articulo</h1>
                    <p>Actualiza la informacion del producto</p>
                </div>
                <a href="admin_inventory.html" class="close-link" aria-label="Cerrar"><i class='bx bx-x'></i></a>
            </header>

            <form class="modal-body" id="editItemForm">
                <div class="grid-2">
                    <label>
                        NOMBRE DEL ARTICULO *
                        <input type="text" id="editName" required>
                    </label>
                    <label>
                        PRECIO / DIA (COP) *
                        <input type="text" inputmode="decimal" id="editPrice" placeholder="0.00" required>
                    </label>
                </div>

                <label>
                    CATEGORIA *
                    <div class="inline-with-btn">
                        <select id="editCategory" required></select>
                        <button type="button" class="ghost-btn" disabled>＋</button>
                    </div>
                </label>

                <label>
                    STOCK DISPONIBLE *
                    <input type="text" inputmode="numeric" id="editStock" placeholder="0" required>
                </label>

                <label>
                    DESCRIPCION *
                    <textarea id="editDescription" rows="3" required></textarea>
                </label>

                <div class="admin-role-box">
                    <div>
                        <strong>Articulo Activo</strong>
                        <p>Visible en el catalogo</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="editActive">
                        <span class="slider-switch"></span>
                    </label>
                </div>

                <div class="section">
                    <p class="section-title">FOTO DEL PRODUCTO <span style="font-size:11px;color:#94a3b8;font-weight:400;">(máx. 1 imagen)</span></p>

                    <div style="display:flex;gap:10px;align-items:center;margin-top:8px;">
                        <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed #cbd5e1;border-radius:10px;font-size:13px;cursor:pointer;color:#64748b;background:#f8fafc;">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            Selecciona imagen (JPEG / PNG / WEBP)
                            <input type="file" id="editImageFile" accept="image/jpeg,image/png,image/webp" style="display:none;">
                        </label>
                        <button type="button" class="ghost-btn" id="editAddFileBtn">＋</button>
                    </div>

                    <div id="editThumbs" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;"></div>
                </div>

                <div class="section specs">
                    <div class="section-head-inline">
                        <p class="section-title">ESPECIFICACIONES TECNICAS</p>
                        <span class="add-static"><i class='bx bx-plus'></i> Agregar</span>
                    </div>

                    <div id="specContainer"></div>
                </div>

                <footer class="modal-footer">
                    <a href="admin_inventory.html" class="btn btn-cancel">Cancelar</a>
                    <button type="submit" class="btn btn-save">Guardar Cambios</button>
                </footer>
            </form>
        </section>
    </div>
<script src="../../client/js/api.js"></script>
<script src="../js/admin_common.js"></script>
<script src="../js/admin_edit_article.js"></script>
</body>
</html>
