<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SportRent</title>
    <meta name="description" content="Crear prestamo en mostrador para administradores de SportRent">
    <meta name="keywords" content="crear prestamo, alquiler, mostrador, administrador, sportrent">
    <meta name="author" content="Sergio Andres Casto Velasquez">
    <link rel="Shortcut icon" href="../../img/icon.png">
    <link rel="icon" type="image/png" href="../../img/icon.png?v=2">
    <link href="../css/boxicons.min.css" rel='stylesheet'>
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="../css/admin_loans.css">
</head>
<body>
<div class="loan-overlay">
    <main class="loan-modal-shell">
        <section class="loan-modal-card">
            <header class="loan-modal-header">
                <div class="header-main">
                    <h1>
                        <i class='bx bx-cart header-title-icon'></i>
                        Crear Alquiler en Mostrador
                    </h1>
                    <p>Asigna un articulo a un cliente de forma rapida</p>
                </div>
                <a href="admin_loans.html" class="close-btn" aria-label="Cerrar"><i class='bx bx-x'></i></a>
            </header>

            <div class="loan-modal-content">
                <article class="loan-left-panel">
                    <div class="block-title"><span><i class='bx bx-user'></i></span> DATOS DEL CLIENTE</div>
                    <div class="searchable-select" id="clienteSelectWrapper">
                        <div class="ss-field" id="clienteField">
                            <i class='bx bx-search ss-icon'></i>
                            <input type="text" id="clienteSearch" class="ss-input" placeholder="Buscar cliente por nombre o email...">
                            <i class='bx bx-chevron-down ss-arrow' id="ssArrow"></i>
                        </div>
                        <div class="ss-dropdown" id="clienteDropdown"></div>
                        <input type="hidden" id="clienteSelectedId">
                    </div>

                    <div class="block-title"><span><i class='bx bx-calendar'></i></span> FECHAS DEL PRESTAMO</div>
                    <label for="inicio">Fecha de Salida</label>
                    <input id="inicio" type="date">

                    <label for="fin">Fecha de Devolucion</label>
                    <input id="fin" type="date">

                    <div class="block-title"><span><i class='bx bx-credit-card'></i></span> METODO DE PAGO</div>
                    <div class="payment-grid">
                        <button type="button" class="pay-chip active" data-method="EFECTIVO">Efectivo</button>
                        <button type="button" class="pay-chip" data-method="TARJETA">Tarjeta</button>
                    </div>
                </article>

                <article class="loan-right-panel">
                    <div class="block-title"><span><i class='bx bx-package'></i></span> CATALOGO RAPIDO</div>
                    <div class="input-with-icon catalog-search">
                        <i class='bx bx-search'></i>
                        <input type="text" id="catalogSearch" placeholder="Buscar articulo...">
                    </div>

                    <div class="catalog-grid" id="catalogGrid"></div>
                </article>
            </div>

            <footer class="loan-modal-footer">
                <div class="footer-summary">
                    <div><span>Dias</span><strong id="loanDays">0</strong></div>
                    <div><span>Pago</span><strong id="loanPayment">Efectivo</strong></div>
                    <div><span>Total a Cobrar</span><strong class="total-amount" id="loanTotal">$0</strong></div>
                </div>
                <div class="footer-actions">
                    <a href="admin_loans.html" class="btn-cancel">Cancelar</a>
                    <button type="button" class="btn-submit" id="createLoanBtn" disabled>Generar Ticket y Entregar Articulo</button>
                </div>
            </footer>
        </section>
    </main>
</div>
<script src="../../client/js/api.js"></script>
<script src="../js/admin_common.js"></script>
<script src="../js/admin_create_loan.js"></script>
</body>
</html>
