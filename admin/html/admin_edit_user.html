<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SportRent</title>
    <meta name="description" content="Vista demo para editar usuario en SportRent">
    <meta name="keywords" content="usuarios, editar usuario, admin, sportrent">
    <meta name="author" content="Sergio Andres Casto Velasquez">
    <link rel="Shortcut icon" href="../../img/icon.png">
    <link rel="icon" type="image/png" href="../../img/icon.png?v=2">
    <link href="../css/boxicons.min.css" rel='stylesheet'>
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="../css/admin_users.css">
</head>
<body>
    <div class="modal-overlay static-open">
        <section class="user-modal" role="dialog" aria-modal="true" aria-labelledby="editUserTitle">
            <header class="modal-header">
                <div class="modal-avatar">CG</div>
                <div>
                    <h1 id="editUserTitle">Editar Usuario</h1>
                    <p>Actualiza los datos del usuario</p>
                </div>
                <a href="admin_users.html" class="close-link" aria-label="Cerrar"><i class='bx bx-x'></i></a>
            </header>

            <form class="modal-form" action="#" method="get">
                <label>Nombre Completo *
                    <input type="text" value="Carlos Garcia">
                </label>
                <label>Email *
                    <input type="email" value="carlos.garcia@email.com">
                </label>
                <div class="form-grid-2">
                    <label>Telefono *
                        <input type="text" value="+34 612 345 678">
                    </label>
                    <label>Ciudad *
                        <input type="text" value="Madrid">
                    </label>
                </div>
                <label>Bio
                    <textarea rows="3">Apasionado del deporte al aire libre, ciclismo de montana y padel.</textarea>
                </label>
                <div class="admin-role-box admin">
                    <div>
                        <strong>Rol Administrador</strong>
                        <p>Tiene acceso completo al panel</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider-switch"></span>
                    </label>
                </div>
                <footer class="modal-footer">
                    <a href="admin_users.html" class="btn btn-cancel">Cancelar</a>
                    <button type="button" class="btn btn-primary">Guardar Cambios</button>
                </footer>
            </form>
        </section>
    </div>
</body>
</html>
