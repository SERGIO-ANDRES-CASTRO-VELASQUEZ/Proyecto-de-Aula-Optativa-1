<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SportRent</title>
    <meta name="description" content="Vista demo para crear usuario en SportRent">
    <meta name="keywords" content="usuarios, crear usuario, admin, sportrent">
    <meta name="author" content="Sergio Andres Casto Velasquez">
    <link rel="Shortcut icon" href="../../img/icon.png">
    <link rel="icon" type="image/png" href="../../img/icon.png?v=2">
    <link href="../css/boxicons.min.css" rel='stylesheet'>
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="../css/admin_users.css">
</head>
<body>
    <div class="modal-overlay static-open">
        <section class="user-modal" role="dialog" aria-modal="true" aria-labelledby="createUserTitle">
            <header class="modal-header">
                <div class="modal-avatar"><i class='bx bx-user'></i></div>
                <div>
                    <h1 id="createUserTitle">Nuevo Usuario</h1>
                    <p>Anade un nuevo miembro a la plataforma</p>
                </div>
                <a href="admin_users.html" class="close-link" aria-label="Cerrar"><i class='bx bx-x'></i></a>
            </header>

            <form class="modal-form" id="createUserForm">
                <label>Nombre Completo *
                    <input type="text" id="createFullName" required>
                </label>
                <label>Username *
                    <input type="text" id="createUsername" required>
                </label>
                <label>Email *
                    <input type="email" id="createEmail" required>
                </label>
                <label>Contrasena *
                    <input type="password" id="createPassword" required>
                </label>
                <div class="form-grid-2">
                    <label>Telefono
                        <input type="text" id="createPhone">
                    </label>
                    <label>Documento
                        <input type="text" id="createDocument">
                    </label>
                </div>
                <div class="admin-role-box">
                    <div>
                        <strong>Rol Administrador</strong>
                        <p>Activa el acceso completo al panel</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="createRoleAdmin">
                        <span class="slider-switch"></span>
                    </label>
                </div>
                <div class="admin-role-box">
                    <div>
                        <strong>Cuenta Activa</strong>
                        <p>Permite iniciar sesion</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="createActive" checked>
                        <span class="slider-switch"></span>
                    </label>
                </div>
                <footer class="modal-footer">
                    <a href="admin_users.html" class="btn btn-cancel">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Crear Usuario</button>
                </footer>
            </form>
        </section>
    </div>
<script src="../../client/js/api.js"></script>
<script src="../js/admin_common.js"></script>
<script src="../js/admin_create_user.js"></script>
</body>
</html>
